<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Title</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #212121;
            --secondary: #616161;
            --accent: #8BAFD0;
            --bg: #FFFFFF;
        }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; position: relative; }
        
        /* Template 1: Title */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 80px; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
        
        .hero-content { display: flex; flex-direction: column; justify-content: center; height: 100%; max-width: 600px; }
        .accent-line { width: 80px; height: 4px; background: var(--accent); margin-bottom: 32px; }
        h1 { font-size: 72px; font-weight: 700; line-height: 1.1; margin: 0 0 24px 0; letter-spacing: -0.03em; }
        .subtitle { font-size: 28px; font-weight: 400; color: var(--secondary); margin: 0; line-height: 1.4; }
        
        .hero-image { position: absolute; right: 0; top: 0; width: 50%; height: 100%; object-fit: cover; object-position: left; }
    </style>
</head>
<body>
    <img src="images/docautofill_hero_banner.png" class="hero-image" alt="DocAutofill Interface">
    <div class="slide-container">
        <div class="header">
            <div class="logo">
                <i data-lucide="file-text" color="#8BAFD0" size="32"></i>
                DocAutofill
            </div>
        </div>
        
        <div class="hero-content">
            <div class="accent-line"></div>
            <h1>The AI-Native<br>Document Infrastructure</h1>
            <p class="subtitle">Intelligent autofill, signature, and workflow automation for the modern web.</p>
        </div>
    </div>
    <script> lucide.createIcons(); </script>
</body>
</html>
