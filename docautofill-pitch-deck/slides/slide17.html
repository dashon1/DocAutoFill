<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Use of Funds</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --primary: #212121; --secondary: #616161; --accent: #8BAFD0; --bg: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; display: flex; }
        
        .text-col { flex: 0 0 40%; display: flex; flex-direction: column; justify-content: center; }
        .chart-col { flex: 1; position: relative; }
        
        .accent-line { width: 80px; height: 4px; background: var(--accent); margin-bottom: 24px; }
        h2 { font-size: 48px; font-weight: 700; margin: 0 0 32px 0; }
        
        .legend { margin-top: 20px; }
        .l-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 20px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; }
        
        #chart { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="text-col">
            <div class="accent-line"></div>
            <h2>Capital Allocation</h2>
            <p style="font-size: 24px; color: var(--secondary); margin-bottom: 40px;">Strategic investment in product velocity and market expansion.</p>
            
            <div class="legend">
                <div class="l-item"><div class="dot" style="background: #212121"></div> Product & Engineering (45%)</div>
                <div class="l-item"><div class="dot" style="background: #8BAFD0"></div> Sales & Marketing (35%)</div>
                <div class="l-item"><div class="dot" style="background: #E0E0E0"></div> Operations & Legal (20%)</div>
            </div>
        </div>
        <div class="chart-col">
            <div id="chart"></div>
        </div>
    </div>
    <script>
        var chartDom = document.getElementById('chart');
        var myChart = echarts.init(chartDom);
        var option = {
            animation: false,
            series: [
                {
                    name: 'Funds',
                    type: 'pie',
                    radius: ['50%', '80%'],
                    avoidLabelOverlap: false,
                    label: { show: false },
                    emphasis: { label: { show: true, fontSize: 32, fontWeight: 'bold' } },
                    labelLine: { show: false },
                    data: [
                        { value: 45, name: 'Product', itemStyle: { color: '#212121' } },
                        { value: 35, name: 'GTM', itemStyle: { color: '#8BAFD0' } },
                        { value: 20, name: 'Ops', itemStyle: { color: '#E0E0E0' } }
                    ]
                }
            ]
        };
        myChart.setOption(option);
    </script>
</body>
</html>
