<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #212121; --secondary: #616161; --accent: #8BAFD0; --bg: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; }
        
        .header { margin-bottom: 80px; }
        .accent-line { width: 80px; height: 4px; background: var(--accent); margin-bottom: 24px; }
        h2 { font-size: 48px; font-weight: 700; margin: 0; }
        
        .timeline { display: flex; justify-content: space-between; position: relative; }
        .timeline::before { content: ''; position: absolute; top: 24px; left: 0; right: 0; height: 4px; background: #F5F5F5; z-index: 0; }
        
        .milestone { position: relative; z-index: 1; width: 220px; }
        .marker { width: 48px; height: 48px; background: var(--accent); border: 4px solid #FFFFFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-weight: 700; margin-bottom: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .q-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .q-items { font-size: 16px; color: var(--secondary); line-height: 1.6; }
        .q-item { display: block; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <div class="accent-line"></div>
            <h2>12-Month Roadmap</h2>
        </div>
        
        <div class="timeline">
            <div class="milestone">
                <div class="marker">Q1</div>
                <div class="q-title">Launch</div>
                <div class="q-items">
                    <span class="q-item">• Public API Beta</span>
                    <span class="q-item">• SOC2 Certification</span>
                    <span class="q-item">• First 50 Customers</span>
                </div>
            </div>
            
            <div class="milestone">
                <div class="marker">Q2</div>
                <div class="q-title">Growth</div>
                <div class="q-items">
                    <span class="q-item">• CRM Integrations</span>
                    <span class="q-item">• Self-Serve Billing</span>
                    <span class="q-item">• Mobile SDK</span>
                </div>
            </div>
            
            <div class="milestone">
                <div class="marker">Q3</div>
                <div class="q-title">Scale</div>
                <div class="q-items">
                    <span class="q-item">• Enterprise SSO</span>
                    <span class="q-item">• Gov Pilot Launch</span>
                    <span class="q-item">• Multi-Region Data</span>
                </div>
            </div>
            
            <div class="milestone">
                <div class="marker">Q4</div>
                <div class="q-title">Expansion</div>
                <div class="q-items">
                    <span class="q-item">• AI Model v2</span>
                    <span class="q-item">• Partner Program</span>
                    <span class="q-item">• $2M ARR Run Rate</span>
                </div>
            </div>
        </div>
    </div>
    <script> lucide.createIcons(); </script>
</body>
</html>
