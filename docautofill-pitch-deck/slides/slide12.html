<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Customer Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #212121; --secondary: #616161; --accent: #8BAFD0; --bg: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .quote-mark { font-size: 160px; color: #F5F5F5; line-height: 0; margin-bottom: 40px; font-family: serif; }
        .quote-text { font-size: 40px; font-weight: 500; text-align: center; max-width: 900px; line-height: 1.3; margin-bottom: 60px; }
        
        .roi-grid { display: flex; gap: 80px; margin-top: 20px; }
        .roi-item { text-align: center; }
        .roi-val { font-size: 48px; font-weight: 700; color: var(--accent); display: block; margin-bottom: 8px; }
        .roi-lbl { font-size: 18px; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .author { display: flex; align-items: center; gap: 16px; margin-top: 60px; }
        .avatar { width: 64px; height: 64px; background: #E0E0E0; border-radius: 50%; }
        .auth-info { text-align: left; }
        .auth-name { font-weight: 700; font-size: 20px; }
        .auth-role { color: var(--secondary); font-size: 16px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="quote-mark">“</div>
        <div class="quote-text">We reduced our contract processing time from days to minutes. The API integration was seamless.</div>
        
        <div class="roi-grid">
            <div class="roi-item">
                <span class="roi-val">282%</span>
                <span class="roi-lbl">ROI Year 1</span>
            </div>
            <div class="roi-item">
                <span class="roi-val">70%</span>
                <span class="roi-lbl">Time Reduction</span>
            </div>
            <div class="roi-item">
                <span class="roi-val">0</span>
                <span class="roi-lbl">Manual Errors</span>
            </div>
        </div>
        
        <div class="author">
            <div class="avatar"><img src="images/testimonial_visual.png" style="width:100%; height:100%; border-radius:50%; object-fit:cover;"></div>
            <div class="auth-info">
                <div class="auth-name">Enterprise Partner</div>
                <div class="auth-role">Head of Legal Operations</div>
            </div>
        </div>
    </div>
    <script> lucide.createIcons(); </script>
</body>
</html>
