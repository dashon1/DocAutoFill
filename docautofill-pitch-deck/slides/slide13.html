<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Financials</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --primary: #212121; --secondary: #616161; --accent: #8BAFD0; --bg: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; }
        
        .header { margin-bottom: 40px; }
        .accent-line { width: 80px; height: 4px; background: var(--accent); margin-bottom: 24px; }
        h2 { font-size: 48px; font-weight: 700; margin: 0; }
        
        #chart { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <div class="accent-line"></div>
            <h2>5-Year Financial Projection</h2>
        </div>
        
        <div id="chart"></div>
    </div>
    <script>
        var chartDom = document.getElementById('chart');
        var myChart = echarts.init(chartDom);
        var option = {
            animation: false,
            tooltip: { trigger: 'axis' },
            legend: { bottom: 0 },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: { 
                type: 'category', 
                data: ['Year 1', 'Year 2', 'Year 3', 'Year 4', 'Year 5'],
                axisLine: { show: false },
                axisTick: { show: false },
                axisLabel: { fontSize: 16 }
            },
            yAxis: { type: 'value', show: false },
            series: [
                {
                    name: 'Revenue ($M)',
                    type: 'bar',
                    stack: 'total',
                    label: { show: true, position: 'top', fontSize: 16, fontWeight: 'bold' },
                    itemStyle: { color: '#212121' },
                    data: [1.2, 3.5, 8.8, 18.5, 32.0]
                },
                {
                    name: 'Gross Margin %',
                    type: 'line',
                    yAxisIndex: 0,
                    itemStyle: { color: '#8BAFD0' },
                    lineStyle: { width: 4 },
                    data: [65, 70, 75, 80, 82]
                }
            ]
        };
        myChart.setOption(option);
    </script>
</body>
</html>
