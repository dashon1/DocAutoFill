<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --primary: #212121; --secondary: #616161; --accent: #8BAFD0; --bg: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; display: flex; }
        
        /* Template 3: Market Data */
        .data-col { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .chart-col { flex: 1; position: relative; }
        
        .label { font-size: 24px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--secondary); margin-bottom: 16px; font-weight: 500; }
        .big-number { font-size: 96px; font-weight: 700; color: var(--accent); line-height: 1; margin: 0 0 24px 0; }
        .description { font-size: 24px; line-height: 1.5; color: var(--primary); max-width: 480px; }
        
        .chart-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="data-col">
            <div class="label">Total Addressable Market</div>
            <div class="big-number">$104.5B</div>
            <p class="description">Global Digital Signature Market by 2032, growing at 40.1% CAGR.</p>
            <p class="description" style="color: var(--secondary); font-size: 18px; margin-top: 24px;">Source: Fortune Business Insights</p>
        </div>
        <div class="chart-col">
            <div id="chart" class="chart-container"></div>
        </div>
    </div>
    <script>
        var chartDom = document.getElementById('chart');
        var myChart = echarts.init(chartDom);
        var option = {
            animation: false,
            grid: { top: '20%', right: '10%', bottom: '10%', left: '10%' },
            xAxis: { 
                type: 'category', 
                data: ['2025', '2030', '2032'],
                axisLine: { show: false },
                axisTick: { show: false },
                axisLabel: { fontSize: 18, color: '#616161', fontFamily: 'Inter' }
            },
            yAxis: { show: false },
            series: [
                {
                    data: [13.4, 70.2, 104.5],
                    type: 'bar',
                    itemStyle: { color: '#8BAFD0', borderRadius: [4, 4, 0, 0] },
                    barWidth: '40%',
                    label: { show: true, position: 'top', formatter: '${c}B', fontSize: 24, fontWeight: 'bold', color: '#212121', fontFamily: 'Inter' }
                }
            ]
        };
        myChart.setOption(option);
    </script>
</body>
</html>
