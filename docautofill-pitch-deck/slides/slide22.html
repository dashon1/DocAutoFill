<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Acquisition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #212121; --secondary: #616161; --accent: #8BAFD0; --bg: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; }
        
        .header { margin-bottom: 50px; }
        .accent-line { width: 80px; height: 4px; background: var(--accent); margin-bottom: 24px; }
        h2 { font-size: 48px; font-weight: 700; margin: 0; }
        
        .funnel { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 800px; margin: 0 auto; }
        .layer { background: #FAFAFA; border: 1px solid #E0E0E0; padding: 20px; display: flex; align-items: center; justify-content: center; gap: 16px; font-size: 20px; font-weight: 600; }
        
        .l1 { width: 100%; border-radius: 8px 8px 0 0; }
        .l2 { width: 80%; }
        .l3 { width: 60%; background: #F0F7FF; border-color: var(--accent); color: var(--accent); border-radius: 0 0 8px 8px; }
        
        .desc { font-size: 16px; color: var(--secondary); font-weight: 400; margin-left: 16px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <div class="accent-line"></div>
            <h2>Acquisition Strategy</h2>
        </div>
        
        <div class="funnel">
            <div class="layer l1">
                <i data-lucide="search" size="24"></i>
                Inbound & Content
                <span class="desc">SEO, Technical Blog, "Engineering as Marketing"</span>
            </div>
            <div class="layer l2">
                <i data-lucide="code" size="24"></i>
                Developer Experience
                <span class="desc">Self-serve API keys, Robust Documentation</span>
            </div>
            <div class="layer l3">
                <i data-lucide="briefcase" size="24"></i>
                Enterprise Expansion
                <span class="desc">Sales-assist for SLAs, Compliance, and Volume</span>
            </div>
        </div>
    </div>
    <script> lucide.createIcons(); </script>
</body>
</html>
