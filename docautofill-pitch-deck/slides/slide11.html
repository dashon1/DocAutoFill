<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>DocAutofill - Traction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --primary: #212121; --secondary: #616161; --accent: #8BAFD0; --bg: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); overflow: hidden; width: 1280px; height: 720px; }
        .slide-container { padding: 60px; height: 100%; box-sizing: border-box; display: flex; }
        
        .text-col { flex: 0 0 35%; display: flex; flex-direction: column; justify-content: center; }
        .chart-col { flex: 1; padding-left: 60px; position: relative; }
        
        .accent-line { width: 80px; height: 4px; background: var(--accent); margin-bottom: 24px; }
        h2 { font-size: 48px; font-weight: 700; margin: 0 0 24px 0; }
        .metric-box { margin-bottom: 32px; }
        .metric-val { font-size: 56px; font-weight: 700; color: var(--accent); display: block; line-height: 1; }
        .metric-lbl { font-size: 18px; color: var(--secondary); font-weight: 500; margin-top: 8px; }
        
        #chart { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="text-col">
            <div class="accent-line"></div>
            <h2>Early Momentum</h2>
            <p style="font-size: 20px; color: var(--secondary); line-height: 1.5; margin-bottom: 40px;">Rapid adoption in pilot programs demonstrating clear product-market fit.</p>
            
            <div class="metric-box">
                <span class="metric-val">3.5x</span>
                <span class="metric-lbl">Faster Completion Rate</span>
            </div>
            <div class="metric-box">
                <span class="metric-val">90%</span>
                <span class="metric-lbl">Setup Time Reduction</span>
            </div>
        </div>
        <div class="chart-col">
            <div id="chart"></div>
        </div>
    </div>
    <script>
        var chartDom = document.getElementById('chart');
        var myChart = echarts.init(chartDom);
        var option = {
            animation: false,
            grid: { top: 40, right: 20, bottom: 40, left: 40, containLabel: true },
            xAxis: { 
                type: 'category', 
                data: ['Q1', 'Q2', 'Q3', 'Q4'],
                axisLine: { show: false },
                axisTick: { show: false },
                axisLabel: { fontSize: 16, color: '#616161' }
            },
            yAxis: { show: false },
            series: [{
                data: [120, 350, 890, 2100],
                type: 'line',
                smooth: true,
                symbolSize: 12,
                itemStyle: { color: '#8BAFD0', borderWidth: 3 },
                lineStyle: { width: 5 },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(139, 175, 208, 0.5)' },
                        { offset: 1, color: 'rgba(139, 175, 208, 0.0)' }
                    ])
                },
                label: { show: true, fontSize: 16, fontWeight: 'bold', formatter: '{c} Users' }
            }]
        };
        myChart.setOption(option);
    </script>
</body>
</html>
